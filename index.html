<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoda's Airhorn - Click with the Force, You Must</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            color: #333;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-size: 1.2em;
            color: #666;
            font-style: italic;
            font-weight: bold;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .airhorn-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .airhorn-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.6);
        }

        .airhorn-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .button-text {
            position: relative;
            z-index: 2;
        }

        .airhorn-button.honking {
            animation: pulse 0.5s ease-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
            }
        }

        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            color: white;
        }

        .stat-label {
            font-size: 1em;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .wisdom {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .yoda-quote {
            font-size: 1.1em;
            color: #333;
            font-style: italic;
            line-height: 1.6;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 0.9em;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .airhorn-button {
                width: 150px;
                height: 150px;
                font-size: 2em;
            }

            .stat-value {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎺 Yoda's Airhorn 🎺</h1>
            <p class="subtitle">Click with the Force, you must</p>
        </div>

        <div class="content">
            <button id="airhorn-button" class="airhorn-button">
                <span class="button-text">HONK!</span>
            </button>
            
            <div class="stats">
                <p class="stat-label">Honks Activated:</p>
                <p class="stat-value" id="honk-count">0</p>
            </div>

            <div class="wisdom">
                <p id="yoda-quote" class="yoda-quote"></p>
            </div>
        </div>

        <footer>
            <p>Brought to you by Yoda 🌿</p>
        </footer>
    </div>

    <script>
        // Yoda's Airhorn - Click with the Force, you must!

        class AirhornSoundGenerator {
          constructor() {
            this.audioContext = null;
            this.honkCount = 0;
            this.yodaQuotes = [
              "Honk, you must. Silence, golden it is not.",
              "Strong with the Force, this airhorn is.",
              "Patience, you have not. Honk again, you will.",
              "Wise, the sound of celebration is.",
              "Disturb the peace, we shall. Regret it, I will not.",
              "Feel the vibrations, you must.",
              "One with the airhorn, become you will.",
              "Honk responsibly, you should.",
              "The Force flows through this button, yes.",
              "Nine-hundred years old, I am. Never tire of honking, I do not.",
              "Funny, this sound is. Laugh, you should.",
              "Annoying neighbors, sorry I am not.",
            ];
          }

          initAudioContext() {
            if (!this.audioContext) {
              this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
          }

          playAirhorn() {
            this.initAudioContext();
            const ctx = this.audioContext;
            const now = ctx.currentTime;
            const duration = 0.5;

            // Create multiple oscillators for a rich airhorn sound
            const frequencies = [
              { freq: 800, time: 0, duration: 0.3 },
              { freq: 1200, time: 0.05, duration: 0.35 },
              { freq: 600, time: 0.1, duration: 0.4 },
            ];

            frequencies.forEach(({ freq, time, duration: dur }) => {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();

              osc.connect(gain);
              gain.connect(ctx.destination);

              osc.frequency.setValueAtTime(freq, now + time);
              osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + time + dur * 0.3);
              osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + time + dur);

              gain.gain.setValueAtTime(0.3, now + time);
              gain.gain.exponentialRampToValueAtTime(0.1, now + time + dur * 0.7);
              gain.gain.exponentialRampToValueAtTime(0, now + time + dur);

              osc.start(now + time);
              osc.stop(now + time + dur);
            });

            // Add some noise for extra "honk" character
            const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < noiseBuffer.length; i++) {
              noiseData[i] = Math.random() * 2 - 1;
            }

            const noiseSource = ctx.createBufferSource();
            const noiseGain = ctx.createGain();
            const noiseLowPass = ctx.createBiquadFilter();

            noiseSource.buffer = noiseBuffer;
            noiseSource.connect(noiseLowPass);
            noiseLowPass.connect(noiseGain);
            noiseGain.connect(ctx.destination);

            noiseLowPass.type = 'lowpass';
            noiseLowPass.frequency.setValueAtTime(2000, now);
            noiseLowPass.frequency.exponentialRampToValueAtTime(500, now + duration);

            noiseGain.gain.setValueAtTime(0.2, now);
            noiseGain.gain.exponentialRampToValueAtTime(0, now + duration);

            noiseSource.start(now);
            noiseSource.stop(now + duration);
          }

          getRandomQuote() {
            return this.yodaQuotes[Math.floor(Math.random() * this.yodaQuotes.length)];
          }

          incrementCount() {
            this.honkCount++;
            return this.honkCount;
          }

          getCount() {
            return this.honkCount;
          }
        }

        // Initialize the airhorn
        const airhorn = new AirhornSoundGenerator();

        // Get DOM elements
        const button = document.getElementById('airhorn-button');
        const honkCountDisplay = document.getElementById('honk-count');
        const yodaQuoteDisplay = document.getElementById('yoda-quote');

        // Set initial quote
        yodaQuoteDisplay.textContent = airhorn.getRandomQuote();

        // Add event listener to button
        button.addEventListener('click', () => {
          // Play the sound
          airhorn.playAirhorn();

          // Update count
          const newCount = airhorn.incrementCount();
          honkCountDisplay.textContent = newCount;

          // Update quote
          yodaQuoteDisplay.textContent = airhorn.getRandomQuote();

          // Add animation class
          button.classList.add('honking');
          setTimeout(() => {
            button.classList.remove('honking');
          }, 500);
        });

        // Allow keyboard activation (spacebar)
        document.addEventListener('keydown', (event) => {
          if (event.code === 'Space') {
            event.preventDefault();
            button.click();
          }
        });

        // Log to console that we're ready
        console.log('🎺 Yoda\'s Airhorn is ready! Click with the Force, you must.');
    </script>
</body>
</html>
