<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoda's Airhorn - Click with the Force, You Must</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎺 Yoda's Airhorn 🎺</h1>
            <p class="subtitle">Click with the Force, you must</p>
        </div>

        <div class="content">
            <button id="airhorn-button" class="airhorn-button">
                <span class="button-text">HONK!</span>
            </button>
            
            <div class="stats">
                <p class="stat-label">Honks Activated:</p>
                <p class="stat-value" id="honk-count">0</p>
            </div>

            <div class="wisdom">
                <p id="yoda-quote" class="yoda-quote"></p>
            </div>
        </div>

        <footer>
            <p>Brought to you by Yoda 🌿</p>
        </footer>
    </div>

    <script src="airhorn.js"></script>
</body>
</html>
