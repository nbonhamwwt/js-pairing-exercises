<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chewbacca's Haikus For Sophisticated Scholars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chewbacca's Haikus For Sophisticated Scholars</h1>
        </div>

        <div class="content">
            <button id="haiku-button" class="haiku-button" aria-label="Generate a new haiku">
                <span class="button-text">Generate Haiku</span>
            </button>

            <div class="wisdom">
                <p id="yoda-haiku" class="yoda-haiku" role="article" aria-live="polite"></p>
            </div>

            <div class="controls">
                <button id="speak-button" class="speak-button" disabled aria-label="Speak the haiku using text-to-speech">
                    <span>🔊 Speak This Haiku</span>
                </button>
            </div>
        </div>

        <footer>
            <p>Brought to you by Chewbacca 🟤</p>
        </footer>
    </div>

    <script src="haiku-generator.js"></script>
</body>
</html>
