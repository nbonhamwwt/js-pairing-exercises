<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoda's Haikus for Boos - Wisdom in Verse, You Must Find</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📜 Yoda's Haikus for Boos 📜</h1>
            <p class="subtitle">Wisdom in verse, find you must</p>
        </div>

        <div class="content">
            <button id="haiku-button" class="haiku-button">
                <span class="button-text">Generate Haiku</span>
            </button>
            
            <div class="stats">
                <p class="stat-label">Haikus Generated:</p>
                <p class="stat-value" id="haiku-count">0</p>
            </div>

            <div class="wisdom">
                <p id="yoda-haiku" class="yoda-haiku"></p>
            </div>

            <div class="controls">
                <button id="speak-button" class="speak-button" disabled>
                    <span>🔊 Speak This Haiku</span>
                </button>
            </div>
        </div>

        <footer>
            <p>Brought to you by Yoda 🌿</p>
        </footer>
    </div>

    <script src="haiku-generator.js"></script>
</body>
</html>
